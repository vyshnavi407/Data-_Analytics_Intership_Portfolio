
<html>
<head>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #ff9966, #ff5e62);
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: white;
        }

        .styled-table {
            margin: auto;
            border-collapse: collapse;
            font-size: 18px;
            min-width: 60%;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.3);
        }

        .styled-table th {
            background-color: #4CAF50;
            color: white;
            padding: 12px;
        }

        .styled-table td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        .styled-table tr:hover {
            background-color: #f1f1f1;
        }
    </style>
</head>

<body>
    <h1>📊 Superstore Dashboard</h1>
    <table border="1" class="dataframe styled-table">
  <thead>
    <tr style="text-align: right;">
      <th>Category</th>
      <th>Sales</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>Furniture</td>
      <td>741999.7953</td>
    </tr>
    <tr>
      <td>Office Supplies</td>
      <td>719047.0320</td>
    </tr>
    <tr>
      <td>Technology</td>
      <td>836154.0330</td>
    </tr>
  </tbody>
</table>
</body>
</html>
